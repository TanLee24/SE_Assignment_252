<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IoT-SPMS | Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

                        "surface-variant": "#31353d",

                        "primary-fixed": "#dbe1ff",

                        "secondary-fixed": "#dbe1ff",
                        "inverse-primary": "#0054d6",
                        "surface-container": "#1c2027",
                        "on-tertiary": "#00363a",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#002b75",

                        "surface-bright": "#353941",
                        "secondary-fixed-dim": "#b3c5ff",
                        "on-secondary-fixed-variant": "#21428f",

                        "error-container": "#93000a",
                        "secondary": "#b3c5ff",
                        "primary": "#b3c5ff",
                        "on-tertiary-container": "#f3feff",
                        "on-primary-fixed-variant": "#003fa4",
                        "secondary-container": "#244592",
                        "on-primary-container": "#fffcff",
                        "surface-dim": "#10131b",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "surface-container-highest": "#31353d",

                        "background": "#10131b"

                    "borderRadius": {
                        "DEFAULT": "1rem",

                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]

<style>
        .glass-card {
            background: rgba(49, 53, 61, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(66, 70, 84, 0.15);
        }
        .mesh-bg {
            background-color: #0a0e15;
            background-image: 
                radial-gradient(at 0% 0%, rgba(47, 108, 240, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 219, 231, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(16, 19, 27, 1) 0px, transparent 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body bg-surface text-on-surface selection:bg-primary-container selection:text-white overflow-hidden">
<!-- Auth Guard Suppression: Shell is hidden as per Transactional Rule -->
<div class="mesh-bg relative min-h-screen flex items-center justify-center p-6">
<!-- Background Asset for Depth -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="abstract high-tech circuit board patterns with glowing blue lines on a dark black background minimalist industrial aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhwPrdGFb9g_ZMs8WJynDcAkJgT1gCTCgXZUZFaNmjavpj_7VOoWg5VRuaZkPGkj6V9oeZshKkyN9wJhwr2doUOJ3nljWsE9hM8Gmtb7NhfUv_N2rZIqpbn5nVfemnlNqs1oLQt-YC6DRdRwGGdkqG_TCfIOXDk7brtIevu59EOEeBcjOwMK1waxEIugahMM8RTmaPdcrew6qHOnrR2W1gFxVXrlI4L72E4X8S4sYPh-LrDxqTh5t5FmHKDfLPiDPtWuoykLWUiA"/>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[480px]">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-lg flex items-center justify-center shadow-[0px_0px_30px_rgba(47,108,240,0.4)] mb-4">
<span class="material-symbols-outlined text-white text-4xl" data-icon="grid_view">grid_view</span>
</div>
<h1 class="font-headline font-bold text-3xl tracking-tight bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">
                    IoT-SPMS
                </h1>
<p class="text-on-surface-variant text-sm tracking-widest uppercase mt-2">Smart Parking Management System</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-[0px_40px_80px_rgba(0,0,0,0.5)]">
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">Log in to IoT-SPMS</h2>
<p class="text-on-surface-variant text-sm">Secure terminal access for authorized operators.</p>
</header>
<form class="space-y-6" id="loginForm">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant block ml-1" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" id="username" placeholder="operator_admin" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant block" for="password">Password</label>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" id="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<a class="w-full h-14 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold tracking-wide shadow-[0px_8px_20px_rgba(47,108,240,0.3)] hover:shadow-[0px_0px_25px_rgba(47,108,240,0.5)] active:scale-95 transition-all flex items-center justify-center gap-2 group" href="index.html">
<span>Deploy Session</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</a>
</div>
</form>
<!-- Status Feedback (Hidden by default) -->
<div class="hidden mt-6 p-4 rounded-md bg-error-container/20 border border-error/20 flex items-center gap-3 animate-pulse" id="errorMessage">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
<p class="text-error text-xs font-medium">Authentication failed. Please verify credentials.</p>
</div>
</div>
<!-- Footer Compliance -->
<footer class="mt-8 text-center">
<p class="text-outline-variant text-[10px] tracking-widest uppercase">
                    © 2024 Kinetic SPMS • Industrial Hub V3.4 Stable
                </p>
<div class="flex justify-center gap-6 mt-4">
<a class="text-xs text-outline-variant hover:text-primary transition-colors" href="#">Privacy Protocol</a>
<a class="text-xs text-outline-variant hover:text-primary transition-colors" href="#">Security Audit</a>
</div>
</footer>
</main>
<!-- Ambient Glow Elements -->
<div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute top-[-10%] left-[-5%] w-[300px] h-[300px] bg-tertiary/10 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nút giao 1 - IoT-SPMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Manrope:wght@600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 'surface': '#0a0e15', 'primary': '#8eabff', 'primary-dim': '#2f6cf0', 'error': '#ff716c', 'success': '#4ade80' }, fontFamily: { 'headline': ['Space Grotesk', 'sans-serif'], 'body': ['Manrope', 'sans-serif'] } } }
        }
    </script>
    <style>
        .glow-green { text-shadow: 0 0 20px rgba(74, 222, 128, 0.5); }
        .glow-blue { text-shadow: 0 0 20px rgba(47, 108, 240, 0.6); }
        .glass { background: rgba(15, 19, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(68, 72, 80, 0.2); }
        .pulse { animation: pulse 2s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .guidance-arrow { stroke-dasharray: 10; animation: dash 1s linear infinite; } @keyframes dash { to { stroke-dashoffset: -20; } }
    </style>
</head>
<body class="bg-surface text-white font-body min-h-screen flex flex-col p-10 overflow-hidden relative text-center">
    
    <button onclick="window.location.href='launcher.html'" class="absolute top-8 left-8 flex items-center gap-2 text-white/20 hover:text-primary transition-all uppercase text-[10px] font-black tracking-widest z-[110]">
        <span class="material-symbols-outlined text-sm">grid_view</span> LAUNCHER
    </button>

    <!-- OVERRIDE OVERLAY -->
    <div id="override-overlay" class="hidden fixed inset-0 bg-surface z-[100] flex items-center justify-center p-20 text-center">
        <h1 id="override-msg" class="text-[10rem] font-headline uppercase glow-blue leading-none tracking-tighter animate-pulse">THÔNG BÁO</h1>
    </div>

    <!-- Header (Center Aligned) -->
    <div id="main-header" class="w-full mx-auto grid grid-cols-3 items-end mb-10 pb-6 border-b border-white/5 px-4">
        <div></div> <!-- Left Spacer -->
        <div class="text-center">
            <h1 id="glb-title-text" class="font-headline text-5xl tracking-tighter glow-blue mb-2 uppercase">HỆ THỐNG ĐIỀU HƯỚNG</h1>
            <p class="text-primary/60 text-xl tracking-[0.2em] font-bold uppercase">NÚT GIAO 1 - GLOBAL NETWORK</p>
        </div>
        <div class="text-right">
            <div class="text-5xl font-headline mb-1" id="clock">00:00:00</div>
            <div class="flex items-center justify-end gap-2 text-success text-sm font-bold">
                <span class="w-2.5 h-2.5 bg-success rounded-full pulse"></span> REAL-TIME
            </div>
        </div>
    </div>

    <!-- Main Content Area (Full Width 35% / 65% Split) -->
    <div id="main-content" class="flex gap-10 w-full mx-auto flex-1 overflow-hidden px-4 text-left">
        <div class="w-[35%] flex flex-col gap-8 py-2">
            <div onclick="window.location.href='local-display.html?zone=A'" class="glass p-10 rounded-[40px] flex justify-between items-center border-l-[6px] border-l-primary cursor-pointer hover:bg-white/5 transition-all group">
                <div><span class="text-primary/40 text-sm font-black uppercase block mb-2">KHU VỰC</span><div class="text-8xl font-headline leading-none group-hover:text-primary">A</div></div>
                <div class="text-right"><div id="disp-slots-A" class="text-success text-7xl font-headline glow-green mb-2">15</div><div class="text-success/70 text-xs font-black uppercase">CHỖ TRỐNG KHẢ DỤNG</div></div>
            </div>
            <div onclick="window.location.href='local-display.html?zone=B'" class="glass p-10 rounded-[40px] flex justify-between items-center border-l-[6px] border-l-primary cursor-pointer hover:bg-white/5 transition-all group">
                <div><span class="text-primary/40 text-sm font-black uppercase block mb-2">KHU VỰC</span><div class="text-8xl font-headline leading-none group-hover:text-primary">B</div></div>
                <div class="text-right"><div id="disp-slots-B" class="text-success text-7xl font-headline glow-green mb-2">42</div><div class="text-success/70 text-xs font-black uppercase">CHỖ TRỐNG KHẢ DỤNG</div></div>
            </div>
            <div onclick="window.location.href='local-display.html?zone=C'" class="glass p-10 rounded-[40px] flex justify-between items-center border-l-[6px] border-l-error cursor-pointer hover:bg-white/5 transition-all group">
                <div><span class="text-primary/40 text-sm font-black uppercase block mb-2">KHU VỰC</span><div class="text-8xl font-headline text-error leading-none">C</div></div>
                <div class="text-right"><div id="disp-slots-C" class="text-error text-7xl font-headline mb-2">0</div><div class="text-error/70 text-xs font-black uppercase">HẾT CHỖ ĐỖ</div></div>
            </div>
        </div>

        <div class="w-[65%] glass rounded-[56px] relative overflow-hidden flex items-center justify-center bg-surface-container/20 border-primary/5 p-8">
            <svg viewBox="0 0 800 1050" class="w-full h-full max-h-[950px]">
                <path d="M 400 950 L 400 500 L 100 500 M 400 500 L 700 500 M 400 500 L 400 120" stroke="white" stroke-width="70" fill="none" stroke-linecap="round" style="opacity: 0.95"/>
                <g class="pulse">
                    <circle cx="400" cy="930" r="35" fill="#2f6cf0" class="shadow-xl"/>
                    <text x="400" y="1025" text-anchor="middle" fill="white" font-size="32" font-weight="900" class="uppercase tracking-[0.3em] glow-blue">BẠN Ở ĐÂY</text>
                </g>
                <g id="node-A" transform="translate(10, 400)"><rect width="200" height="200" rx="40" fill="#0a0e15" stroke="rgba(255,255,255,0.2)" stroke-width="4"/><text x="100" y="130" text-anchor="middle" fill="white" font-size="120" font-weight="900" class="font-headline">A</text></g>
                <g id="node-B" transform="translate(590, 400)"><rect width="200" height="200" rx="40" fill="#0a0e15" stroke="rgba(255,255,255,0.2)" stroke-width="4"/><text x="100" y="130" text-anchor="middle" fill="white" font-size="120" font-weight="900" class="font-headline">B</text></g>
                <g id="node-C" transform="translate(300, 10)"><rect width="200" height="180" rx="40" fill="#0a0e15" stroke="rgba(255,255,255,0.2)" stroke-width="4"/><text x="100" y="120" text-anchor="middle" fill="white" font-size="100" font-weight="900" class="font-headline text-error">C</text></g>
                
                <path id="arrow-to-A" d="M 400 850 L 400 500 L 225 500" stroke="#2f6cf0" stroke-width="16" fill="none" marker-end="url(#arrowhead)" class="hidden guidance-arrow"/>
                <path id="arrow-to-B" d="M 400 850 L 400 500 L 575 500" stroke="#2f6cf0" stroke-width="16" fill="none" marker-end="url(#arrowhead)" class="hidden guidance-arrow"/>
                <path id="arrow-to-C" d="M 400 850 L 400 205" stroke="#2f6cf0" stroke-width="16" fill="none" marker-end="url(#arrowhead)" class="hidden guidance-arrow"/>
                <defs><marker id="arrowhead" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto"><polygon points="0 0, 5 2, 0 4" fill="#2f6cf0" /></marker></defs>
            </svg>
        </div>
    </div>

    <script src="assets/scripts/core.js"></script>
    <script>
        function updateFromData() {
            const zones = ['A', 'B', 'C'];
            let bestZone = null; let maxSlots = -1;
            const title = localStorage.getItem('dg_header');
            if (title) document.getElementById('glb-title-text').innerText = title;

            zones.forEach(z => {
                const slots = localStorage.getItem(`dg_slots_${z}`) || (z === 'C' ? 0 : 15);
                const slotEl = document.getElementById(`disp-slots-${z}`);
                if(slotEl) slotEl.innerText = slots;
                if (parseInt(slots) > maxSlots) { maxSlots = parseInt(slots); bestZone = z; }
                document.getElementById(`arrow-to-${z}`).classList.add('hidden');
            });
            if (bestZone && maxSlots > 0) document.getElementById(`arrow-to-${bestZone}`).classList.remove('hidden');
        }

        function checkOverride() {
            const isOverride = localStorage.getItem('dg_override_active') === 'true';
            const globalMsg = localStorage.getItem('dg_global_override');
            const overlay = document.getElementById('override-overlay');
            const mainHeader = document.getElementById('main-header');
            const mainContent = document.getElementById('main-content');
            
            if (isOverride && globalMsg && globalMsg.trim() !== "") {
                overlay.querySelector('h1').innerText = globalMsg;
                overlay.classList.remove('hidden');
                mainHeader.classList.add('hidden');
                mainContent.classList.add('hidden');
            } else {
                overlay.classList.add('hidden');
                mainHeader.classList.remove('hidden');
                mainContent.classList.remove('hidden');
            }
        }
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(() => { updateClock(); updateFromData(); checkOverride(); }, 1000);
        updateClock(); updateFromData(); checkOverride();
    </script>
</body>
</html>
